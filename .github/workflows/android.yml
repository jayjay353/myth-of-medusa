name: Android Build
on: push

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    container:
      image: barichello/godot-ci:4.2.2
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          
      - name: Setup Templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.2.2.stable
          wget -q https://github.com/godotengine/godot-builds/releases/download/4.2.2-stable/Godot_v4.2.2-stable_export_templates.tpz
          unzip -q Godot_v4.2.2-stable_export_templates.tpz
          mv templates/* ~/.local/share/godot/export_templates/4.2.2.stable/
          
      - name: Import Assets
        run: godot --headless --verbose -e --quit --path . || true
        
      - name: Export APK
        run: |
          mkdir -p build/android
          godot --headless --verbose --export-debug "Android" build/android/MythOfMedusa.apk
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MythOfMedusa-APK
          path: build/android/MythOfMedusa.apk
