name: Android Build
on: push

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.2.2
    steps:
      - uses: actions/checkout@v4

      - name: Configure Godot
        run: |
          mkdir -p ~/.config/godot
          cat > ~/.config/godot/editor_settings-4.tres << EOF
          [gd_resource type="EditorSettings" format=3]

          [resource]
          export/android/android_sdk_path = "/usr/lib/android-sdk"
          export/android/debug_keystore = "/root/android/debug.keystore"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          export/android/java_sdk_path = "/usr/lib/jvm/java-17-openjdk-amd64"
          EOF

      - name: Import Assets
        run: godot --headless -e --quit || true

      - name: Export APK
        run: |
          mkdir -p build/android
          godot --headless --export-debug "Android" build/android/MythOfMedusa.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MythOfMedusa-APK
          path: build/android/*.apk
