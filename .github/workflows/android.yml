name: Android Build
on: push

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v1
        with:
          version: 4.2.2
          use-dotnet: false
          
      - name: Setup Android Export Templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates
          curl -L https://github.com/godotengine/godot-builds/releases/download/4.2.2-stable/Godot_v4.2.2-stable_export_templates.tpz -o templates.tpz
          unzip templates.tpz -d ~/.local/share/godot/export_templates/
          mv ~/.local/share/godot/export_templates/templates ~/.local/share/godot/export_templates/4.2.2.stable
          
      - name: Export APK
        run: |
          mkdir build
          godot --headless --export-release "Android" build/MythOfMedusa.apk
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MythOfMedusa-APK
          path: build/MythOfMedusa.apk
